<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: rgba(68, 66, 64, 0.6);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px 20px;
        }

        .container>a {
            border: 2px solid black;
            height: 200px;
            width: 200px;
            border-radius: 10px;
            overflow: hidden;
        }

        .container>a>img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .container>a :nth-child(1) {
            background-color: lightgreen;
        }

        .container>a:hover>img {
            transform: scale(1.1);
            /* 10% Zoom upon hovering */
        }
    </style>
</head>

<body>
    <div class="container">
        <a target="_blank" href="https://wa.me/919134032961"><img
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/1022px-WhatsApp.svg.png"
                alt="Whatsapp"></a>
        <a target="_blank" href="https://www.instagram.com/asishkr.saha/?hl=en"><img
                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRHlopO-s7goTS5F-0Z1Wgbana3XJk0uQsm0Q&s"
                alt="Instagram" </a>
            <a target="_blank" href="https://www.facebook.com/ashis.saha.10888/"><img
                    src="https://i.pinimg.com/564x/2a/46/84/2a46845a791bdfec03d58f024caf0b50.jpg" alt="Facebook" </a>
                <a target="_blank" href="https://www.youtube.com/@ashsaha5750"><img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ617gHQEB-CWMrD8ct91sFb6mgI-9IvVN9KA&s"
                        alt="Youtube" </a>
    </div>
</body>

</html>
